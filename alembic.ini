# alembic.ini — Substrate 1 schema-per-tenant migrations.
#
# Two version directories: shared/ for control-plane migrations, tenant/ for
# per-tenant schema migrations. env.py routes based on -x mode argument.
# Database URL is resolved from DATABASE_URL env var (see env.py).

[alembic]
script_location = alembic

# Multiple version locations. Both directories are scanned by Alembic; branch
# labels in each migration's down_revision keep them disjoint.
version_locations = %(here)s/alembic/versions/shared %(here)s/alembic/versions/tenant

# Standard datetime-prefixed migration filenames for chronological sorting.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

prepend_sys_path = .
timezone = UTC
truncate_slug_length = 40

# sqlalchemy.url is set programmatically in env.py from DATABASE_URL.
# This blank entry exists only to satisfy Alembic's config parser.
sqlalchemy.url =

[post_write_hooks]
# Empty by design. We don't run autoformatters here; raw SQL migrations are
# hand-written and don't need it.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
