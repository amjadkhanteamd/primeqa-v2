{% extends "base.html" %}
{% block title %}New Run - PrimeQA{% endblock %}
{% block content %}
<div class="max-w-2xl">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Trigger New Run</h1>
    <form method="POST" action="/runs" class="bg-white shadow rounded-lg p-6 space-y-6">
        <div>
            <label for="environment_id" class="block text-sm font-medium text-gray-700">Environment</label>
            <select id="environment_id" name="environment_id" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border px-3 py-2">
                {% for env in environments %}<option value="{{ env.id }}">{{ env.name }} ({{ env.env_type }})</option>{% endfor %}
            </select>
        </div>
        <div>
            <label for="run_type" class="block text-sm font-medium text-gray-700">Run Type</label>
            <select id="run_type" name="run_type" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border px-3 py-2">
                <option value="full">Full (generate + execute)</option>
                <option value="generate_only">Generate Only</option>
                <option value="execute_only">Execute Only</option>
            </select>
        </div>
        <div>
            <label for="source_type" class="block text-sm font-medium text-gray-700">Source</label>
            <select id="source_type" name="source_type" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border px-3 py-2">
                <option value="requirements">Requirements</option>
                <option value="suite">Test Suite</option>
                <option value="jira_tickets">Jira Tickets</option>
                <option value="rerun">Re-run</option>
            </select>
        </div>
        <div>
            <label for="source_ids" class="block text-sm font-medium text-gray-700">Source IDs (comma-separated)</label>
            <input id="source_ids" name="source_ids" type="text" required placeholder="1, 2, 3" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border px-3 py-2">
        </div>
        <div>
            <label for="priority" class="block text-sm font-medium text-gray-700">Priority</label>
            <select id="priority" name="priority" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border px-3 py-2">
                <option value="normal">Normal</option>
                <option value="high">High</option>
                <option value="critical">Critical</option>
            </select>
        </div>
        <button type="submit" class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500">Start Run</button>
    </form>
</div>
{% endblock %}
