{#
  Confirmation modal — one instance per page, driven by JS (static/js/confirm.js).

  API:
    <button data-confirm
            data-confirm-title="Delete test case?"
            data-confirm-message="This will move it to trash. You can restore it later."
            data-confirm-variant="danger"           {# default | danger #}
            data-confirm-type-to="DELETE"           {# optional: typed-confirmation token #}
            data-confirm-form="#delete-tc-form">    {# form to submit on confirm #}
      Delete
    </button>

  The form #delete-tc-form gets submitted on confirm.
  For JS-driven actions use data-confirm-action="#js-callback-id" and wire it manually.
#}

{% macro confirm_modal() %}
<div id="confirm-modal"
     class="hidden fixed inset-0 z-[70] overflow-y-auto"
     role="dialog" aria-modal="true" aria-labelledby="confirm-title">
  <div class="flex min-h-full items-center justify-center p-4">
    <div class="fixed inset-0 bg-gray-500 bg-opacity-50 transition-opacity" data-confirm-close></div>
    <div class="relative bg-white rounded-lg shadow-xl max-w-md w-full p-6" data-confirm-dialog>
      <h3 class="text-lg font-medium text-gray-900" id="confirm-title" data-confirm-title-slot>Confirm</h3>
      <p class="mt-2 text-sm text-gray-500" id="confirm-message" data-confirm-message-slot>Are you sure?</p>

      <div class="hidden mt-3" data-confirm-type-wrap>
        <label class="block text-xs text-gray-600 mb-1">
          Type <span class="font-mono font-semibold text-gray-900" data-confirm-type-expected></span> to confirm
        </label>
        <input type="text" autocomplete="off"
               class="block w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-indigo-500 focus:ring-indigo-500 font-mono"
               data-confirm-type-input>
      </div>

      <div class="mt-5 flex justify-end space-x-3">
        <button type="button" class="rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-700 ring-1 ring-gray-300 hover:bg-gray-50"
                data-confirm-close>Cancel</button>
        <button type="button"
                class="rounded-md px-3 py-2 text-sm font-semibold text-white"
                data-confirm-submit
                data-variant-default="bg-indigo-600 hover:bg-indigo-500"
                data-variant-danger="bg-red-600 hover:bg-red-500">Confirm</button>
      </div>
    </div>
  </div>
</div>
{% endmacro %}
