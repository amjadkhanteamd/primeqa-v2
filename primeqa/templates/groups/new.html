{% extends "settings/base.html" %}
{% block title %}New Group - PrimeQA{% endblock %}
{% block settings_content %}
<div class="max-w-lg">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Create Group</h1>
    <form method="POST" action="/groups" class="bg-white shadow rounded-lg p-6 space-y-6">
            {{ csrf_input | safe }}
        <div><label class="block text-sm font-medium text-gray-700">Group Name</label>
            <input name="name" required class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 sm:text-sm" placeholder="QA Team"></div>
        <div><label class="block text-sm font-medium text-gray-700">Description</label>
            <textarea name="description" rows="3" class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 sm:text-sm" placeholder="Optional description..."></textarea></div>
        <button type="submit" class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500">Create Group</button>
    </form>
</div>
{% endblock %}
