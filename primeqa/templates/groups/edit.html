{% extends "settings/base.html" %}
{% block title %}Edit {{ group.name }} - PrimeQA{% endblock %}
{% block settings_content %}
<div class="max-w-lg">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Edit Group</h1>
    {% if error %}<div class="rounded-md bg-red-50 p-4 mb-4"><p class="text-sm text-red-700">{{ error }}</p></div>{% endif %}
    <form method="POST" action="/groups/{{ group.id }}/edit" class="bg-white shadow rounded-lg p-6 space-y-6">
            {{ csrf_input | safe }}
        <div><label class="block text-sm font-medium text-gray-700">Group Name</label>
            <input name="name" value="{{ group.name }}" required class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 sm:text-sm"></div>
        <div><label class="block text-sm font-medium text-gray-700">Description</label>
            <textarea name="description" rows="3" class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 sm:text-sm">{{ group.description or '' }}</textarea></div>
        <div class="flex space-x-3">
            <button type="submit" class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-500">Save Changes</button>
            <a href="/groups/{{ group.id }}" class="rounded-md bg-gray-100 px-4 py-2 text-sm font-semibold text-gray-700 hover:bg-gray-200">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
