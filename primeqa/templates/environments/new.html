{% extends "settings/base.html" %}
{% block title %}New Environment - PrimeQA{% endblock %}
{% block settings_content %}
<div class="max-w-2xl">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Add Environment</h1>
    <form method="POST" action="/environments" class="bg-white shadow rounded-lg p-6 space-y-6">
        <div><label class="block text-sm font-medium text-gray-700">Name</label><input name="name" required class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 sm:text-sm" placeholder="Dev Sandbox"></div>
        <div><label class="block text-sm font-medium text-gray-700">Type</label><select name="env_type" class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 sm:text-sm"><option value="sandbox">Sandbox</option><option value="uat">UAT</option><option value="staging">Staging</option><option value="production">Production</option></select></div>
        <div><label class="block text-sm font-medium text-gray-700">Salesforce Instance URL</label><input name="sf_instance_url" required class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 sm:text-sm" placeholder="https://acme--dev.sandbox.my.salesforce.com"></div>
        <div><label class="block text-sm font-medium text-gray-700">API Version</label><input name="sf_api_version" value="59.0" class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 sm:text-sm"></div>
        <div><label class="block text-sm font-medium text-gray-700">Capture Mode</label><select name="capture_mode" class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 sm:text-sm"><option value="smart" selected>Smart (default)</option><option value="full">Full</option><option value="minimal">Minimal</option></select></div>
        <div><label class="block text-sm font-medium text-gray-700">Max Execution Slots</label><input name="max_execution_slots" type="number" value="2" min="1" max="10" class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 sm:text-sm"></div>
        <button type="submit" class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500">Create Environment</button>
    </form>
</div>
{% endblock %}
