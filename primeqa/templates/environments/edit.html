{% extends "settings/base.html" %}
{% block title %}Edit {{ env.name }} - PrimeQA{% endblock %}
{% block settings_content %}
<div class="max-w-2xl">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Edit Environment</h1>
    {% if error %}<div class="rounded-md bg-red-50 p-4 mb-4"><p class="text-sm text-red-700">{{ error }}</p></div>{% endif %}
    <form method="POST" action="/environments/{{ env.id }}/edit" class="bg-white shadow rounded-lg p-6 space-y-6">
        <div><label class="block text-sm font-medium text-gray-700">Name</label>
            <input name="name" value="{{ env.name }}" required class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 sm:text-sm"></div>
        <div><label class="block text-sm font-medium text-gray-700">Type</label>
            <select name="env_type" class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 sm:text-sm">
                {% for t in ['sandbox','uat','staging','production'] %}<option value="{{ t }}" {% if env.env_type == t %}selected{% endif %}>{{ t|capitalize }}</option>{% endfor %}
            </select></div>
        <div class="border-t pt-4"><h3 class="text-sm font-medium text-gray-500 mb-3">Execution Settings</h3>
            <div class="grid grid-cols-2 gap-4">
                <div><label class="block text-sm font-medium text-gray-700">Capture Mode</label>
                    <select name="capture_mode" class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 sm:text-sm">
                        {% for m in ['smart','full','minimal'] %}<option value="{{ m }}" {% if env.capture_mode == m %}selected{% endif %}>{{ m|capitalize }}</option>{% endfor %}
                    </select></div>
                <div><label class="block text-sm font-medium text-gray-700">Max Execution Slots</label>
                    <input name="max_execution_slots" type="number" value="{{ env.max_execution_slots }}" min="1" max="10" class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 sm:text-sm"></div>
                <div><label class="block text-sm font-medium text-gray-700">Execution Policy</label>
                    <select name="execution_policy" class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 sm:text-sm">
                        {% for p in ['full','read_only','disabled'] %}<option value="{{ p }}" {% if env.execution_policy == p %}selected{% endif %}>{{ p|replace('_',' ')|capitalize }}</option>{% endfor %}
                    </select></div>
                <div><label class="inline-flex items-center mt-6">
                    <input name="cleanup_mandatory" type="checkbox" {% if env.cleanup_mandatory %}checked{% endif %} class="rounded border-gray-300">
                    <span class="ml-2 text-sm text-gray-700">Cleanup mandatory</span></label></div>
            </div>
        </div>
        <div class="flex space-x-3">
            <button type="submit" class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-500">Save Changes</button>
            <a href="/environments/{{ env.id }}" class="rounded-md bg-gray-100 px-4 py-2 text-sm font-semibold text-gray-700 hover:bg-gray-200">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
