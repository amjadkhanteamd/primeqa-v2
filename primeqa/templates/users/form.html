{% extends "base.html" %}
{% block title %}{{ 'Edit' if edit_user else 'New' }} User - PrimeQA{% endblock %}
{% block content %}
<div class="max-w-lg">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">{{ 'Edit' if edit_user else 'Create' }} User</h1>
    {% if error %}<div class="rounded-md bg-red-50 p-4 mb-4"><p class="text-sm text-red-700">{{ error }}</p></div>{% endif %}
    <form method="POST" class="bg-white shadow rounded-lg p-6 space-y-6">
        <div><label class="block text-sm font-medium text-gray-700">Full Name</label><input name="full_name" value="{{ edit_user.full_name if edit_user else '' }}" required class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 sm:text-sm"></div>
        <div><label class="block text-sm font-medium text-gray-700">Email</label><input name="email" type="email" value="{{ edit_user.email if edit_user else '' }}" {% if edit_user %}readonly class="mt-1 block w-full rounded-md bg-gray-50 border border-gray-300 px-3 py-2 sm:text-sm"{% else %}required class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 sm:text-sm"{% endif %}></div>
        {% if not edit_user %}<div><label class="block text-sm font-medium text-gray-700">Password</label><input name="password" type="password" required class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 sm:text-sm"></div>{% endif %}
        <div><label class="block text-sm font-medium text-gray-700">Role</label><select name="role" class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 sm:text-sm">{% for r in ['admin','tester','ba','viewer'] %}<option value="{{ r }}" {% if edit_user and edit_user.role == r %}selected{% endif %}>{{ r|capitalize }}</option>{% endfor %}</select></div>
        {% if edit_user %}<div><label class="inline-flex items-center"><input name="is_active" type="checkbox" {% if edit_user.is_active %}checked{% endif %} class="rounded border-gray-300"><span class="ml-2 text-sm text-gray-700">Active</span></label></div>{% endif %}
        <button type="submit" class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-500">{{ 'Update' if edit_user else 'Create' }}</button>
    </form>
</div>
{% endblock %}
